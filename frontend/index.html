<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal Assistant</title>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --border: #2d2d4e;
    --card-radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a0533 0%, #0f0f1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 22px;
  }
  .logo h1 { font-size: 20px; font-weight: 700; }
  .logo p { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .stat-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text2);
  }
  .stat-badge span { color: var(--accent2); font-weight: 700; }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    transition: all .2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent2); }

  .main { max-width: 1400px; margin: 0 auto; padding: 28px 24px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    display: flex; align-items: center; gap: 16px;
    cursor: pointer;
    transition: all .2s;
  }
  .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .stat-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 22px; flex-shrink: 0;
  }
  .stat-card h3 { font-size: 26px; font-weight: 800; line-height: 1; }
  .stat-card p { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 999px;
    padding: 8px 18px;
    color: var(--text2);
    cursor: pointer; font-size: 14px; transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .search-box {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    color: var(--text);
    font-size: 14px; width: 220px; outline: none; transition: border .2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--text2); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 20px;
    position: relative; transition: all .2s; overflow: hidden;
  }
  .card:hover { border-color: #4a4a7a; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.3); }
  .card.done { opacity: .45; }

  .card-accent {
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
    border-radius: var(--card-radius) 0 0 var(--card-radius);
  }

  .card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .cat-badge {
    display: inline-flex; align-items: center; gap: 6px;
    border-radius: 999px; padding: 4px 12px;
    font-size: 12px; font-weight: 600; flex-shrink: 0;
  }
  .card-title { font-size: 16px; font-weight: 700; line-height: 1.4; flex: 1; }
  .card-details { font-size: 13px; color: var(--text2); margin-bottom: 12px; line-height: 1.6; }

  .card-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .meta-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 10px;
    font-size: 12px; color: var(--text2);
  }

  .card-actions { display: flex; gap: 8px; }
  .btn-edit {
    flex: 1; border: none; border-radius: 10px;
    padding: 8px; font-size: 13px; cursor: pointer;
    transition: all .2s; font-weight: 600;
    background: rgba(59,130,246,.12); color: #93c5fd;
    border: 1px solid rgba(59,130,246,.25);
  }
  .btn-edit:hover { background: rgba(59,130,246,.28); }

  .btn-done, .btn-delete {
    flex: 1; border: none; border-radius: 10px;
    padding: 8px; font-size: 13px; cursor: pointer;
    transition: all .2s; font-weight: 600;
  }
  .btn-done { background: rgba(16,185,129,.15); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
  .btn-done:hover { background: rgba(16,185,129,.3); }
  .btn-delete { background: rgba(239,68,68,.1); color: var(--red); border: 1px solid rgba(239,68,68,.2); }
  .btn-delete:hover { background: rgba(239,68,68,.25); }

  .expense-section {
    margin-top: 36px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 24px;
  }
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .expense-bar-wrap { margin-bottom: 14px; }
  .expense-bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .expense-bar-label span:first-child { color: var(--text); }
  .expense-bar-label span:last-child { color: var(--accent2); font-weight: 700; }
  .expense-bar-bg { background: rgba(255,255,255,.06); border-radius: 999px; height: 8px; overflow: hidden; }
  .expense-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .6s ease; }

  .empty { grid-column: 1/-1; text-align: center; padding: 64px 20px; color: var(--text2); }
  .empty .emoji { font-size: 56px; margin-bottom: 16px; }
  .empty p { font-size: 16px; }

  .loading { grid-column: 1/-1; text-align: center; padding: 64px; color: var(--text2); font-size: 22px; }

  /* category styles — keep Arabic keys since data is Arabic */
  .cat-مواعيد   { background: rgba(59,130,246,.15); color: #93c5fd; }
  .cat-مهام     { background: rgba(16,185,129,.15); color: #6ee7b7; }
  .cat-مصروفات  { background: rgba(245,158,11,.15); color: #fcd34d; }
  .cat-تذكيرات  { background: rgba(239,68,68,.15);  color: #fca5a5; }
  .cat-ملاحظات  { background: rgba(168,85,247,.15); color: #d8b4fe; }

  .accent-مواعيد  { background: #3b82f6; }
  .accent-مهام    { background: #10b981; }
  .accent-مصروفات { background: #f59e0b; }
  .accent-تذكيرات { background: #ef4444; }
  .accent-ملاحظات { background: #a855f7; }

  .icon-مواعيد  { background: rgba(59,130,246,.15); }
  .icon-مهام    { background: rgba(16,185,129,.15); }
  .icon-مصروفات { background: rgba(245,158,11,.15); }
  .icon-تذكيرات { background: rgba(239,68,68,.15);  }
  .icon-ملاحظات { background: rgba(168,85,247,.15); }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 1000;
    place-items: center;
  }
  .modal-overlay.open { display: grid; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    width: min(500px, 95vw);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--bg);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; color: var(--text); font-size: 14px; outline: none;
    transition: border .2s; font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--surface); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1; background: var(--accent); color: #fff;
    border: none; border-radius: 10px; padding: 11px;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s;
  }
  .btn-save:hover { background: var(--accent2); }
  .btn-cancel {
    flex: 1; background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border); border-radius: 10px; padding: 11px;
    font-size: 15px; cursor: pointer; transition: all .2s;
  }
  .btn-cancel:hover { border-color: var(--accent); color: var(--text); }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .main { padding: 16px; }
    .search-box { width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <h1>Personal Assistant</h1>
      <p>Appointments · Tasks · Expenses · Reminders</p>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-badge">Total: <span id="total-count">—</span></div>
    <button class="refresh-btn" onclick="loadAll()">🔄 Refresh</button>
  </div>
</header>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h2>✏️ Edit Item</h2>
    <input type="hidden" id="edit-id">
    <div class="field">
      <label>Category</label>
      <select id="edit-category">
        <option value="مواعيد">📅 Appointments</option>
        <option value="مهام">✅ Tasks</option>
        <option value="مصروفات">💰 Expenses</option>
        <option value="تذكيرات">🔔 Reminders</option>
        <option value="ملاحظات">📝 Notes</option>
      </select>
    </div>
    <div class="field">
      <label>Title</label>
      <input type="text" id="edit-title" placeholder="Title">
    </div>
    <div class="field">
      <label>Details</label>
      <textarea id="edit-details" rows="3" placeholder="Details (optional)"></textarea>
    </div>
    <div class="field">
      <label>Reminder (date & time)</label>
      <input type="datetime-local" id="edit-remind">
    </div>
    <div style="display:flex; gap:10px">
      <div class="field" style="flex:1">
        <label>Amount</label>
        <input type="number" id="edit-amount" placeholder="0">
      </div>
      <div class="field" style="flex:1">
        <label>Currency</label>
        <select id="edit-currency">
          <option value="EGP">EGP</option>
          <option value="USD">USD</option>
          <option value="EUR">EUR</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveEdit()">💾 Save</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="main">

  <div class="stats-grid" id="stats-grid"></div>

  <div class="toolbar">
    <button class="filter-btn active" data-cat="" onclick="setFilter(this,'')">All</button>
    <button class="filter-btn" data-cat="مواعيد"  onclick="setFilter(this,'مواعيد')">📅 Appointments</button>
    <button class="filter-btn" data-cat="مهام"    onclick="setFilter(this,'مهام')">✅ Tasks</button>
    <button class="filter-btn" data-cat="مصروفات" onclick="setFilter(this,'مصروفات')">💰 Expenses</button>
    <button class="filter-btn" data-cat="تذكيرات" onclick="setFilter(this,'تذكيرات')">🔔 Reminders</button>
    <button class="filter-btn" data-cat="ملاحظات" onclick="setFilter(this,'ملاحظات')">📝 Notes</button>
    <button class="filter-btn" data-cat="done"    onclick="setFilter(this,'done')">☑️ Done</button>
    <input class="search-box" id="search" placeholder="🔍 Search..." oninput="renderCards()">
  </div>

  <div class="cards-grid" id="cards-grid">
    <div class="loading">⏳ Loading...</div>
  </div>

  <div class="expense-section" id="expense-section" style="display:none">
    <div class="section-title">💰 Expense Summary</div>
    <div id="expense-bars"></div>
    <div style="margin-top:16px; font-size:15px; color:var(--text2)">
      Total: <strong id="expense-total" style="color:var(--accent2)"></strong>
    </div>
  </div>

</div>

<script>
const CAT_LABEL = {مواعيد:'Appointments', مهام:'Tasks', مصروفات:'Expenses', تذكيرات:'Reminders', ملاحظات:'Notes'};
const EMOJI     = {مواعيد:'📅', مهام:'✅', مصروفات:'💰', تذكيرات:'🔔', ملاحظات:'📝'};
let allItems = [];
let currentFilter = '';

async function api(path, opts={}) {
  const r = await fetch('/api' + path, opts);
  return r.json();
}

async function loadAll() {
  const [items, stats, expSummary] = await Promise.all([
    api('/items'), api('/stats'), api('/expenses/summary'),
  ]);
  allItems = items;
  renderStats(stats);
  renderCards();
  renderExpenses(expSummary);
  document.getElementById('total-count').textContent = stats.total;
}

function renderStats(stats) {
  const cats = ['مواعيد','مهام','مصروفات','تذكيرات','ملاحظات'];
  const byCat = Object.fromEntries((stats.by_category||[]).map(r=>[r.category, r.cnt]));
  document.getElementById('stats-grid').innerHTML =
    cats.map(cat => `
      <div class="stat-card" onclick="setFilterById('${cat}')">
        <div class="stat-icon icon-${cat}">${EMOJI[cat]}</div>
        <div><h3>${byCat[cat]||0}</h3><p>${CAT_LABEL[cat]}</p></div>
      </div>`).join('') + `
    <div class="stat-card" onclick="setFilterById('done')">
      <div class="stat-icon" style="background:rgba(16,185,129,.15)">☑️</div>
      <div><h3>${stats.done||0}</h3><p>Done</p></div>
    </div>`;
}

function setFilterById(cat) {
  const btn = document.querySelector(`[data-cat="${cat}"]`);
  if (btn) setFilter(btn, cat);
}

function setFilter(btn, cat) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = cat;
  renderCards();
}

function renderCards() {
  const search = document.getElementById('search').value.toLowerCase();
  let items = currentFilter === 'done'
    ? allItems.filter(i => i.done)
    : allItems.filter(i => !i.done && (!currentFilter || i.category === currentFilter));

  if (search) items = items.filter(i =>
    i.title.toLowerCase().includes(search) || (i.details||'').toLowerCase().includes(search));

  const grid = document.getElementById('cards-grid');
  if (!items.length) {
    grid.innerHTML = `<div class="empty"><div class="emoji">🎉</div><p>Nothing here yet</p></div>`;
    return;
  }

  grid.innerHTML = items.map(item => {
    const emoji = EMOJI[item.category] || '📌';
    const label = CAT_LABEL[item.category] || item.category;
    const overdue = item.remind_at && !item.reminded && new Date(item.remind_at) < new Date();
    return `
    <div class="card ${item.done?'done':''}" id="card-${item.id}">
      <div class="card-accent accent-${item.category}"></div>
      <div class="card-header">
        <span class="cat-badge cat-${item.category}">${emoji} ${label}</span>
      </div>
      <div class="card-title">${esc(item.title)}</div>
      ${item.details ? `<div class="card-details">${esc(item.details)}</div>` : ''}
      <div class="card-meta">
        ${item.remind_at ? `<span class="meta-tag" style="${overdue?'color:#ef4444':''}">⏰ ${item.remind_at}</span>` : ''}
        ${item.amount ? `<span class="meta-tag">💵 ${item.amount} ${item.currency}</span>` : ''}
        <span class="meta-tag" style="color:#475569">${(item.created_at||'').slice(0,10)}</span>
      </div>
      ${!item.done ? `
      <div class="card-actions">
        <button class="btn-edit" onclick="openEdit(${item.id})">✏️ Edit</button>
        <button class="btn-done" onclick="markDone(${item.id})">✅ Done</button>
        <button class="btn-delete" onclick="deleteItem(${item.id})">🗑️ Delete</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function renderExpenses(summary) {
  const sec = document.getElementById('expense-section');
  if (!summary.length) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  const max = Math.max(...summary.map(r=>r.total));
  const total = summary.reduce((a,r)=>a+r.total, 0);
  document.getElementById('expense-total').textContent =
    total.toFixed(2) + ' ' + (summary[0]?.currency||'EGP');
  document.getElementById('expense-bars').innerHTML = summary.map(r => `
    <div class="expense-bar-wrap">
      <div class="expense-bar-label">
        <span>${r.expense_category||'Other'}</span>
        <span>${r.total.toFixed(2)} ${r.currency}</span>
      </div>
      <div class="expense-bar-bg">
        <div class="expense-bar-fill" style="width:${(r.total/max*100).toFixed(1)}%"></div>
      </div>
    </div>`).join('');
}

async function markDone(id) {
  await api(`/items/${id}/done`, {method:'PATCH'});
  allItems = allItems.map(i => i.id===id ? {...i, done:1} : i);
  renderCards();
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  await api(`/items/${id}`, {method:'DELETE'});
  allItems = allItems.filter(i => i.id!==id);
  renderCards();
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function openEdit(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-category').value = item.category;
  document.getElementById('edit-title').value = item.title || '';
  document.getElementById('edit-details').value = item.details || '';
  document.getElementById('edit-remind').value = item.remind_at ? item.remind_at.replace(' ', 'T') : '';
  document.getElementById('edit-amount').value = item.amount || '';
  document.getElementById('edit-currency').value = item.currency || 'EGP';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const remind = document.getElementById('edit-remind').value;
  await api(`/items/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      category: document.getElementById('edit-category').value,
      title:    document.getElementById('edit-title').value,
      details:  document.getElementById('edit-details').value,
      remind_at: remind ? remind.replace('T', ' ') : null,
      amount:   parseFloat(document.getElementById('edit-amount').value) || null,
      currency: document.getElementById('edit-currency').value,
    })
  });
  document.getElementById('modal-overlay').classList.remove('open');
  await loadAll();
}

setInterval(loadAll, 30000);
loadAll();
</script>
</body>
</html>
